<footer class="site-footer">
  <div class="container footer-row">
    <div>
      &copy; {{ site.time | date: '%Y' }} {{ site.first_name }} {{ site.last_name }}.
      {{ site.footer_text }}
      {% if site.impressum_path %}<a href="{{ site.url }}{{ site.baseurl }}{{ site.impressum_path }}">Impressum</a>{% endif %}
    </div>
    {% if site.data.build %}
    <div class="build-tag" title="ref {{ site.data.build.ref }} · run #{{ site.data.build.run_number }} · built {{ site.data.build.time }}">
      build {{ site.data.build.sha | slice: 0, 7 }}
    </div>
    {% elsif site.last_updated %}
    <div class="build-tag">updated {{ "now" | date: '%Y-%m-%d' }}</div>
    {% endif %}
  </div>
</footer>
