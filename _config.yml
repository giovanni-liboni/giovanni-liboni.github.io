# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Giovanni Liboni
first_name: Giovanni
middle_name: 
last_name: Liboni
email: giovanni[at]liboni[dot]me
description: > # the ">" symbol means to ignore newlines until "footer_text:"
  Computers. Automation. Cloud.
footer_text: >
  Powered by <a href="http://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.

seo:
    name: Giovanni Liboni's webpage
    type: person

icon: "🚀" # the emoji used as the favicon
url: "https://giovanni.liboni.me"
baseurl: ""    # served at the root of giovanni.liboni.me; jekyll-github-metadata
               # otherwise auto-sets /pages/<owner> which 404s every asset.
last_updated: true # set to true if you want to display last updated in the footer
impressum_path:  # set to path to include impressum link in the footer, use the same path as permalink in a page, helps to conform with EU GDPR

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true

# Dimensions
max_width: 1000px

# TODO: add layout settings (single page vs. multi-page)

# -----------------------------------------------------------------------------
# Open Graph
# -----------------------------------------------------------------------------
# Display links to the page with a preview object on social media.
serve_og_meta: false # Include Open Graph meta tags in the HTML head
og_image: # The site-wide (default for all links) Open Graph preview image

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

github_username: giovanni-liboni # your GitHub user name
twitter_username: GiovanniLiboni # your Twitter handle
linkedin_username: giovanniliboni # your LinkedIn user name
scholar_userid: VPFpRTEAAAAJ # your Google Scholar ID
orcid_id: 0000-0002-0981-0750 # your ORCID ID
medium_username: # your Medium username
quora_username: # your Quora username
publons_id: # your ID on Publons
research_gate_profile: Giovanni-Liboni # your profile on ResearchGate
blogger_url: # your blogger URL
work_url: # work page URL
keybase_username: # your keybase user name
wikidata_id: # your wikidata id

contact_note: >
  Keep looking. Don't settle.

google_analytics: UA-98105477-1 # out your google-analytics code
panelbear_analytics: XXXXXXXXX # panelbear analytics site ID

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name:   # your blog must have a name for it to show up in the nav bar
blog_description: Writing space about tech, open source, and homelab projects.
permalink: /blog/:year/:title/

# Pagination
pagination:
  enabled: true

# Comments
disqus_shortname: al-folio # put your disqus shortname

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

news_limit: 3

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

# Markdown and syntax highlight
markdown: kramdown
highlighter: rouge
highlight_theme: github  # https://github.com/jwarby/jekyll-pygments-themes
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

# Includes & excludes
include: ['_pages', 'CNAME']
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - devbox.json
  - devbox.lock
  - .devbox
  - .ruby-version
  - CONTRIBUTING.md
  - LICENSE
  - README.md
keep_files:
  - .nojekyll

# Plug-ins
plugins:
  - jekyll-email-protect
  - jekyll-github-metadata
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------

scholar:

  last_name: Liboni
  first_name: [Giovanni, L.]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib

  replace_strings: true
  join_strings: true

  query: "@*"

# -----------------------------------------------------------------------------
# Optional Features
# -----------------------------------------------------------------------------

enable_google_analytics:    false
enable_panelbear_analytics: false
enable_math:                true
enable_darkmode:            true

# -----------------------------------------------------------------------------
# Library versions (only kept for libs we still load via CDN)
# -----------------------------------------------------------------------------

mathjax:
  version: "3.1.2"
